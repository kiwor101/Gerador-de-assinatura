<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gerador de Assinatura - Santa Casa</title>
  <style>
    :root {
      color-scheme: light;
      --blue: #09275c;
      --gold: #b98a24;
      --gold-soft: #d7c08a;
      --ink: #253142;
      --muted: #697282;
      --line: #dfe4ea;
      --surface: #f6f8fb;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--surface);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(520px, 1fr);
      gap: 24px;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(9, 39, 92, 0.08);
    }

    .form-panel {
      padding: 22px;
    }

    .preview-panel {
      min-width: 0;
      padding: 22px;
    }

    h1 {
      margin: 0 0 4px;
      color: var(--blue);
      font-size: 22px;
      line-height: 28px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    label {
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      height: 42px;
      border: 1px solid #cfd6df;
      border-radius: 6px;
      padding: 0 12px;
      color: var(--ink);
      font: 14px Arial, Helvetica, sans-serif;
      outline: none;
    }

    select {
      background: #ffffff;
      cursor: pointer;
    }

    input[type="color"] {
      width: 54px;
      min-width: 54px;
      padding: 4px;
      cursor: pointer;
    }

    input[type="file"] {
      height: auto;
      min-height: 42px;
      padding: 9px 12px;
      background: #ffffff;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(185, 138, 36, 0.16);
    }

    .color-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .color-field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
      border: 1px solid #cfd6df;
      border-radius: 6px;
      padding: 8px 10px;
      background: #ffffff;
    }

    .color-field span {
      overflow: hidden;
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .suffix-field {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
    }

    .suffix-field input {
      border-radius: 6px 0 0 6px;
    }

    .suffix {
      display: inline-flex;
      align-items: center;
      height: 42px;
      border: 1px solid #cfd6df;
      border-left: 0;
      border-radius: 0 6px 6px 0;
      background: #f4f7fa;
      color: #526070;
      padding: 0 10px;
      font-size: 13px;
      white-space: nowrap;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 8px 0 14px;
    }

    .preset {
      background: #f2f5f8;
      color: var(--blue);
      border: 1px solid #d7dde6;
    }

    .logo-library {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding: 2px 2px 10px;
    }

    .logo-option {
      display: grid;
      gap: 6px;
      min-height: 118px;
      border: 1px solid #d5dce5;
      border-radius: 6px;
      background: #ffffff;
      padding: 8px;
      color: var(--ink);
      text-align: left;
    }

    .logo-select {
      display: grid;
      gap: 6px;
      min-height: 100px;
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--ink);
      text-align: left;
    }

    .logo-card-actions {
      display: flex;
      justify-content: flex-end;
    }

    .logo-delete {
      min-height: 28px;
      border: 1px solid #f0c8c8;
      background: #fff1f1;
      color: #9b1c1c;
      font-size: 11px;
      padding: 0 8px;
    }

    .logo-option.active {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(185, 138, 36, 0.16);
    }

    .logo-thumb {
      display: grid;
      place-items: center;
      height: 72px;
      background: #f8fafc;
      border: 1px solid #edf1f5;
      border-radius: 4px;
    }

    .logo-thumb img {
      max-width: 100%;
      max-height: 64px;
      object-fit: contain;
    }

    .logo-name {
      overflow: hidden;
      color: #304057;
      font-size: 11px;
      font-weight: 700;
      line-height: 14px;
      padding: 0;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      font: 700 13px Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    .primary {
      background: var(--blue);
      color: var(--white);
    }

    .secondary {
      background: #efe5cc;
      color: #6f4f12;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .status {
      min-height: 18px;
      margin-top: 12px;
      color: #23613b;
      font-size: 12px;
      line-height: 18px;
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--blue);
      font-size: 15px;
      font-weight: 700;
      line-height: 20px;
    }

    .preview-box {
      overflow-x: auto;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    textarea {
      width: 100%;
      min-height: 210px;
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      resize: vertical;
      color: #26313f;
      font: 12px Consolas, "Courier New", monospace;
      line-height: 17px;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        width: min(720px, calc(100% - 28px));
        padding: 18px 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel form-panel">
      <h1>Gerador de Assinatura</h1>
      <p class="subtitle">Preencha os campos e copie a assinatura pronta para o usu&aacute;rio.</p>

      <div class="field">
        <label for="name">Nome completo</label>
        <input id="name">
      </div>

      <div class="field">
        <label for="role">Cargo</label>
        <input id="role">
      </div>

      <div class="field">
        <label for="department">Setor</label>
        <input id="department">
      </div>

      <div class="field">
        <label for="extension">Ramal</label>
        <input id="extension">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <div class="suffix-field">
          <input id="email">
          <span class="suffix">@santacasaandradina.org</span>
        </div>
      </div>

      <div class="field">
        <label for="teams">Teams</label>
        <div class="suffix-field">
          <input id="teams">
          <span class="suffix">@santacasaandradina.org</span>
        </div>
      </div>

      <div class="field">
        <label>Logos salvos</label>
        <div class="logo-library" id="logo-library"></div>
      </div>

      <div class="field">
        <label for="logo">Adicionar nova logo</label>
        <input id="logo" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
      </div>

      <div class="field">
        <label for="layout">Modelo HTML</label>
        <select id="layout">
          <option value="classic">Outlook Classic</option>
          <option value="web">Outlook Web compacto</option>
        </select>
      </div>

      <label>Cores da assinatura</label>
      <div class="color-grid">
        <div class="color-field">
          <span>Nome</span>
          <input id="name-color" type="color" value="#0b2f66">
        </div>
        <div class="color-field">
          <span>Textos</span>
          <input id="text-color" type="color" value="#1f2933">
        </div>
        <div class="color-field">
          <span>Rotulos</span>
          <input id="label-color" type="color" value="#005daa">
        </div>
        <div class="color-field">
          <span>Barra</span>
          <input id="bar-color" type="color" value="#005daa">
        </div>
      </div>

      <div class="preset-grid">
        <button class="preset" type="button" data-preset="default">Padrao</button>
        <button class="preset" type="button" data-preset="blue">Azul</button>
        <button class="preset" type="button" data-preset="navy">Azul escuro</button>
        <button class="preset" type="button" data-preset="cyan">Azul claro</button>
        <button class="preset" type="button" data-preset="red">Vermelho</button>
        <button class="preset" type="button" data-preset="water">Verde agua</button>
        <button class="preset" type="button" data-preset="goldBlack">Dourado preto</button>
      </div>

      <div class="actions">
        <button class="primary" type="button" id="copy-signature">Copiar assinatura</button>
        <button class="secondary" type="button" id="copy-html">Copiar HTML</button>
        <button class="secondary wide" type="button" id="copy-image">Copiar como imagem PNG</button>
        <button class="secondary wide" type="button" id="download-image">Baixar imagem PNG</button>
      </div>
      <div class="status" id="status" aria-live="polite"></div>
    </section>

    <section class="panel preview-panel">
      <p class="section-title">Pr&eacute;via</p>
      <div class="preview-box" id="preview"></div>
      <textarea id="html-output" aria-label="HTML gerado"></textarea>
    </section>
  </main>

  <script>
    const fixedPhone = "(18) 3702-1100";
    const fixedSite = "www.santacasaandradina.com.br";
    const fixedAddress = "Av. Guanabara, 730 - Centro, Andradina - SP, 16901-901";
    const fixedEmailDomain = "@santacasaandradina.org";
    const fields = ["name", "role", "department", "extension", "email", "teams", "layout", "name-color", "text-color", "label-color", "bar-color"];
    const savedLogoStorageKey = "santa-casa-uploaded-logos";
    const selectedLogoStorageKey = "santa-casa-selected-logo-v2";
    const logoLibrary = [
      { src: "assets/logos/logo-upload-original.jpg" },
      { src: "assets/logos/logo-santa-casa-assinatura-720x300.png" },
      { src: "assets/logos/original-1-logo-santa-casa.png" },
      { src: "assets/logos/original-2-logo-santa-casa-assinatura.png" },
      { src: "assets/logos/original-3-logo-santa-casa.png" },
      { src: "assets/logos/opcao-1-logo-santa-casa.png" },
      { src: "assets/logos/opcao-3-logo-santa-casa.png" },
      { src: "assets/logos/opcao-4-logo-santa-casa.png" }
    ];
    const layouts = {
      classic: {
        width: 620,
        logoCell: 200,
        logoWidth: 195,
        gap: 10,
        nameSize: 19,
        textSize: 13,
        roleSize: 13,
        footerSize: 11
      },
      web: {
        width: 560,
        logoCell: 166,
        logoWidth: 160,
        gap: 9,
        nameSize: 16,
        textSize: 11,
        roleSize: 11,
        footerSize: 10
      }
    };
    const presets = {
      default: {
        nameColor: "#0b2f66",
        textColor: "#1f2933",
        labelColor: "#005daa",
        barColor: "#005daa"
      },
      blue: {
        nameColor: "#005daa",
        textColor: "#263747",
        labelColor: "#008dcc",
        barColor: "#008dcc"
      },
      navy: {
        nameColor: "#06265a",
        textColor: "#1f2933",
        labelColor: "#0b4c92",
        barColor: "#0b4c92"
      },
      cyan: {
        nameColor: "#0878b8",
        textColor: "#243746",
        labelColor: "#1296d4",
        barColor: "#1296d4"
      },
      red: {
        nameColor: "#8f1d2c",
        textColor: "#2f2930",
        labelColor: "#b11f35",
        barColor: "#b11f35"
      },
      water: {
        nameColor: "#006d77",
        textColor: "#25343a",
        labelColor: "#00a6a6",
        barColor: "#00a6a6"
      },
      goldBlack: {
        nameColor: "#1f1f1f",
        textColor: "#2b2b2b",
        labelColor: "#b98a24",
        barColor: "#b98a24"
      }
    };
    let uploadedLogos = loadUploadedLogos();
    const storedLogoSource = localStorage.getItem(selectedLogoStorageKey);
    let logoSource = logoLibrary.concat(uploadedLogos).some((logo) => logo.src === storedLogoSource) ? storedLogoSource : logoLibrary[0].src;
    const preview = document.getElementById("preview");
    const output = document.getElementById("html-output");
    const status = document.getElementById("status");
    const logoLibraryElement = document.getElementById("logo-library");

    function loadUploadedLogos() {
      try {
        const saved = JSON.parse(localStorage.getItem(savedLogoStorageKey) || "[]");
        return Array.isArray(saved) ? saved : [];
      } catch {
        return [];
      }
    }

    function saveUploadedLogos() {
      localStorage.setItem(savedLogoStorageKey, JSON.stringify(uploadedLogos));
    }

    function allLogos() {
      return logoLibrary.concat(uploadedLogos).map((logo, index) => ({
        src: logo.src,
        name: "Opcao " + (index + 1)
      }));
    }

    function isUploadedLogo(src) {
      return uploadedLogos.some((logo) => logo.src === src);
    }

    function selectLogo(src, message) {
      logoSource = src;
      localStorage.setItem(selectedLogoStorageKey, src);
      if (message) status.textContent = message;
      renderLogoLibrary();
      render();
    }

    function renderLogoLibrary() {
      logoLibraryElement.innerHTML = "";
      allLogos().forEach((logo) => {
        const item = document.createElement("div");
        const canDelete = isUploadedLogo(logo.src);
        item.className = "logo-option" + (logo.src === logoSource ? " active" : "");
        item.innerHTML =
          '<button type="button" class="logo-select">' +
            '<span class="logo-thumb"><img src="' + logo.src + '" alt=""></span>' +
            '<span class="logo-name">' + escapeHtml(logo.name) + '</span>' +
          '</button>' +
          '<span class="logo-card-actions">' +
            (canDelete ? '<button type="button" class="logo-delete">Excluir</button>' : '') +
          '</span>';
        item.querySelector(".logo-select").addEventListener("click", () => selectLogo(logo.src, "Logo selecionado."));
        const deleteButton = item.querySelector(".logo-delete");
        if (deleteButton) {
          deleteButton.addEventListener("click", () => deleteLogo(logo.src));
        }
        logoLibraryElement.appendChild(item);
      });
    }

    function deleteLogo(src) {
      uploadedLogos = uploadedLogos.filter((logo) => logo.src !== src);
      saveUploadedLogos();
      if (logoSource === src) {
        logoSource = logoLibrary[0].src;
        localStorage.setItem(selectedLogoStorageKey, logoSource);
      }
      status.textContent = "Logo excluida.";
      renderLogoLibrary();
      render();
    }

    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function phoneHref(phone) {
      const digits = phone.replace(/\D/g, "");
      if (!digits) return "#";
      if (digits.startsWith("55")) return "+" + digits;
      return "+55" + digits;
    }

    function color(id, fallback) {
      const current = value(id);
      return /^#[0-9a-fA-F]{6}$/.test(current) ? current : fallback;
    }

    function currentLayout() {
      return layouts[value("layout")] || layouts.classic;
    }

    function roleLine() {
      const role = value("role");
      const department = value("department");
      if (role && department) return role + " | " + department;
      return role || department || "";
    }

    function withFixedDomain(text) {
      const value = text.trim();
      if (!value) return "";
      const prefix = value.includes("@") ? value.split("@")[0] : value;
      return prefix + fixedEmailDomain;
    }

    function contactRows() {
      const extension = value("extension");
      return [
        { label: "Telefone:", value: fixedPhone, muted: extension ? " | Ramal: " + extension : "", href: "tel:" + phoneHref(fixedPhone) },
        { label: "Email:", value: withFixedDomain(value("email")), href: "mailto:" + withFixedDomain(value("email")) },
        { label: "Teams:", value: withFixedDomain(value("teams")) || withFixedDomain(value("email")) },
        { label: "Site:", value: fixedSite, href: "https://" + fixedSite },
        { label: "Endereco:", htmlLabel: "Endere&ccedil;o:", value: fixedAddress, nowrap: true }
      ];
    }

    function contactRowHtml(row, layout, textColor, labelColor) {
      const label = row.htmlLabel || row.label;
      const content = row.href && row.value
        ? '<a href="' + row.href + '" style="color:' + textColor + '; text-decoration:none;">' + escapeHtml(row.value) + '</a>'
        : escapeHtml(row.value);
      const muted = row.muted ? '<span style="color:#7a828c;">' + escapeHtml(row.muted) + '</span>' : "";
      return '<tr><td style="font-size:' + layout.textSize + 'px; line-height:' + (layout.textSize + 7) + 'px; color:' + textColor + ';' + (row.nowrap ? ' white-space:nowrap;' : '') + '">' +
        '<span style="color:' + labelColor + '; font-weight:bold;">' + label + '</span>&nbsp;' +
        content + muted +
      '</td></tr>';
    }

    function signatureHtml() {
      const layout = currentLayout();
      const name = escapeHtml(value("name"));
      const role = escapeHtml(roleLine());
      const phone = escapeHtml(fixedPhone);
      const extension = escapeHtml(value("extension"));
      const email = escapeHtml(withFixedDomain(value("email")));
      const teams = escapeHtml(withFixedDomain(value("teams")) || withFixedDomain(value("email")));
      const logo = escapeHtml(logoSource);
      const nameColor = color("name-color", "#09275c");
      const textColor = color("text-color", "#2f3b4a");
      const labelColor = color("label-color", "#b98a24");
      const barColor = color("bar-color", "#b98a24");
      const rowsHtml = contactRows().map((row) => contactRowHtml(row, layout, textColor, labelColor)).join("");

      return '<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:' + layout.width + 'px; max-width:' + layout.width + 'px; font-family:Arial, Helvetica, sans-serif; color:' + nameColor + '; border-collapse:collapse;">' +
        '<tr>' +
          '<td style="padding:0 0 14px 0; border-bottom:2px solid ' + barColor + ';">' +
            '<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%; border-collapse:collapse;">' +
              '<tr>' +
                '<td valign="middle" style="width:' + layout.logoCell + 'px; padding:0 ' + layout.gap + 'px 0 0;">' +
                  '<img src="' + logo + '" width="' + layout.logoWidth + '" alt="Irmandade Santa Casa de Andradina" style="display:block; width:' + layout.logoWidth + 'px; height:auto; border:0; outline:none; text-decoration:none;">' +
                '</td>' +
                '<td valign="middle" style="width:1px; background:' + barColor + '; font-size:0; line-height:0;">&nbsp;</td>' +
                '<td valign="middle" style="padding:0 0 0 ' + layout.gap + 'px;">' +
                  '<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%; border-collapse:collapse;">' +
                    '<tr><td style="font-size:' + layout.nameSize + 'px; line-height:' + (layout.nameSize + 4) + 'px; font-weight:bold; color:' + nameColor + '; padding:0 0 3px 0;">' + name + '</td></tr>' +
                    '<tr><td style="font-size:' + layout.roleSize + 'px; line-height:' + (layout.roleSize + 5) + 'px; color:#5b6470; padding:0 0 11px 0;">' + role + '</td></tr>' +
                    rowsHtml +
                  '</table>' +
                '</td>' +
              '</tr>' +
            '</table>' +
          '</td>' +
        '</tr>' +
        '<tr><td style="padding:9px 0 0 0; font-size:' + layout.footerSize + 'px; line-height:' + (layout.footerSize + 4) + 'px; color:#7a828c;">Irmandade Santa Casa de Andradina | Desde 1940</td></tr>' +
        '<tr><td style="padding:5px 0 0 0; font-size:10px; line-height:14px; color:#9aa1aa;">Esta mensagem pode conter informa&ccedil;&otilde;es confidenciais destinadas exclusivamente ao destinat&aacute;rio.</td></tr>' +
      '</table>';
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function drawText(ctx, text, x, y, options) {
      ctx.fillStyle = options.color;
      ctx.font = options.font;
      ctx.fillText(text, x, y);
    }

    function fitText(ctx, text, x, y, maxWidth, options) {
      let size = options.size;
      do {
        ctx.font = (options.weight ? options.weight + " " : "") + size + "px Arial";
        if (ctx.measureText(text).width <= maxWidth || size <= options.minSize) break;
        size -= 1;
      } while (size > 0);

      ctx.fillStyle = options.color;
      ctx.fillText(text, x, y);
    }

    function drawContainedImage(ctx, image, x, y, maxWidth, maxHeight) {
      const ratio = Math.min(maxWidth / image.naturalWidth, maxHeight / image.naturalHeight);
      const width = image.naturalWidth * ratio;
      const height = image.naturalHeight * ratio;
      ctx.drawImage(image, x + ((maxWidth - width) / 2), y + ((maxHeight - height) / 2), width, height);
    }

    async function imageDataUrl(src) {
      if (src.startsWith("data:")) return src;
      const response = await fetch(src);
      const blob = await response.blob();
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function imageBlob() {
      render();

      const source = preview.firstElementChild.cloneNode(true);
      const logo = source.querySelector("img");
      if (logo) logo.src = await imageDataUrl(logoSource);

      const rect = preview.firstElementChild.getBoundingClientRect();
      const width = Math.ceil(rect.width);
      const height = Math.ceil(rect.height);
      const scale = 2;
      const wrapper = document.createElement("div");
      wrapper.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
      wrapper.style.width = width + "px";
      wrapper.style.minHeight = height + "px";
      wrapper.style.background = "#ffffff";
      wrapper.appendChild(source);

      const serialized = new XMLSerializer().serializeToString(wrapper);
      const svg =
        '<svg xmlns="http://www.w3.org/2000/svg" width="' + width + '" height="' + height + '">' +
          '<foreignObject width="100%" height="100%">' +
            serialized +
          '</foreignObject>' +
        '</svg>';
      const svgUrl = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }));

      try {
        const image = await loadImage(svgUrl);
        const canvas = document.createElement("canvas");
        canvas.width = width * scale;
        canvas.height = height * scale;
        const ctx = canvas.getContext("2d");
        ctx.scale(scale, scale);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(image, 0, 0, width, height);
        return new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
      } finally {
        URL.revokeObjectURL(svgUrl);
      }
    }

    async function copyImage() {
      const blob = await imageBlob();
      if (!window.ClipboardItem) {
        status.textContent = "Este navegador nao permitiu copiar imagem. Use Baixar imagem PNG.";
        return;
      }
      await navigator.clipboard.write([
        new ClipboardItem({ "image/png": blob })
      ]);
      status.textContent = "Imagem copiada.";
    }

    async function downloadImage() {
      const blob = await imageBlob();
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "assinatura-santa-casa.png";
      link.click();
      URL.revokeObjectURL(link.href);
      status.textContent = "Imagem gerada.";
    }

    function render() {
      const html = signatureHtml();
      preview.innerHTML = html;
      output.value = html;
    }

    async function copyText(text, message) {
      await navigator.clipboard.writeText(text);
      status.textContent = message;
    }

    async function copySignature() {
      const html = signatureHtml();
      if (window.ClipboardItem) {
        await navigator.clipboard.write([
          new ClipboardItem({
            "text/html": new Blob([html], { type: "text/html" }),
            "text/plain": new Blob([preview.innerText], { type: "text/plain" })
          })
        ]);
        status.textContent = "Assinatura copiada.";
        return;
      }
      await copyText(html, "HTML copiado.");
    }

    fields.forEach((id) => document.getElementById(id).addEventListener("input", render));
    document.querySelectorAll("[data-preset]").forEach((button) => {
      button.addEventListener("click", () => {
        const preset = presets[button.dataset.preset];
        document.getElementById("name-color").value = preset.nameColor;
        document.getElementById("text-color").value = preset.textColor;
        document.getElementById("label-color").value = preset.labelColor;
        document.getElementById("bar-color").value = preset.barColor;
        status.textContent = "Cores aplicadas.";
        render();
      });
    });
    document.getElementById("logo").addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.addEventListener("load", () => {
        const uploadedLogo = {
          src: reader.result
        };
        uploadedLogos = uploadedLogos.filter((logo) => logo.src !== uploadedLogo.src);
        uploadedLogos.unshift(uploadedLogo);
        saveUploadedLogos();
        selectLogo(uploadedLogo.src, "Logo adicionada e selecionada.");
        event.target.value = "";
      });
      reader.readAsDataURL(file);
    });
    document.getElementById("copy-signature").addEventListener("click", copySignature);
    document.getElementById("copy-html").addEventListener("click", () => copyText(output.value, "HTML copiado."));
    document.getElementById("copy-image").addEventListener("click", copyImage);
    document.getElementById("download-image").addEventListener("click", downloadImage);
    renderLogoLibrary();
    render();
  </script>
</body>
</html>
